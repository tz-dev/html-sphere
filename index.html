<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Sphere</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <div class="stage" id="stage">
        <canvas id="sphereCanvas" aria-label="Interactive rotating sphere"></canvas>

        <div id="warpOverlay"></div>
        <div id="starLabel"></div>

        <div id="customCursor" aria-hidden="true">
          <img src="img/cursor.png" alt="" />
        </div>

        <aside class="overlay visible" id="overlay">
          <h1>Interactive Sphere</h1>
          <ul class="desc">
            <li><strong>Left-drag</strong> sphere to spin</li>
            <li><strong>Right-drag</strong> background to rotate view</li>
            <li><strong>Middle-click</strong> a star to warp to it</li>
            <li><strong>Scrollwheel</strong> to zoom</li>
            <li><strong>Double-click</strong> to reset</li>
          </ul>

          <div class="control control-inline">
            <label for="speed">Speed</label>
            <input id="speed" type="range" min="0" max="720" value="120" step="1" />
            <div class="value" id="speedVal">120 °/s</div>
          </div>

          <div class="control control-inline">
            <label for="axisX">Axis X</label>
            <input id="axisX" type="range" min="-100" max="100" value="30" step="1" />
            <div class="value" id="axisXVal">0.30</div>
          </div>

          <div class="control control-inline">
            <label for="axisY">Axis Y</label>
            <input id="axisY" type="range" min="-100" max="100" value="100" step="1" />
            <div class="value" id="axisYVal">1.00</div>
          </div>

          <div class="control control-inline">
            <label for="axisZ">Axis Z</label>
            <input id="axisZ" type="range" min="-100" max="100" value="10" step="1" />
            <div class="value" id="axisZVal">0.10</div>
          </div>

          <div class="control control-inline">
            <label for="zoom">Zoom</label>
            <input id="zoom" type="range" min="1" max="240" value="100" step="1" />
            <div class="value" id="zoomVal">1.00×</div>
          </div>

          <div class="control control-inline">
            <label for="hue">Color Hue <span class="hue-preview" id="huePreview"></span></label>
            <input id="hue" type="range" min="0" max="360" value="210" step="1" />
            <div class="value" id="hueVal">210°</div>
          </div>

          <div class="control control-inline">
            <label for="sceneBrightness">Brightness</label>
            <input id="sceneBrightness" type="range" min="40" max="180" value="100" step="1" />
            <div class="value" id="sceneBrightnessVal">1.00×</div>
          </div>

          <div class="control control-inline">
            <label for="sceneContrast">Contrast</label>
            <input id="sceneContrast" type="range" min="40" max="180" value="100" step="1" />
            <div class="value" id="sceneContrastVal">1.00×</div>
          </div>

          <div class="control control-inline">
            <label for="starDensity">Star Density</label>
            <input id="starDensity" type="range" min="25" max="300" value="100" step="1" />
            <div class="value" id="starDensityVal">1.00×</div>
          </div>

          <div class="control control-inline">
            <label for="sphereGlowAmount">Sphere Glow</label>
            <input id="sphereGlowAmount" type="range" min="0" max="300" value="100" step="1" />
            <div class="value" id="sphereGlowAmountVal">1.00×</div>
          </div>

          <div class="control control-inline">
            <label for="starGlowAmount">Star Glow</label>
            <input id="starGlowAmount" type="range" min="0" max="300" value="100" step="1" />
            <div class="value" id="starGlowAmountVal">1.00×</div>
          </div>

          <div class="grid-2">
            <div class="control control-inline control-inline-number">
              <label for="latCount">Horiz. lines</label>
              <input id="latCount" type="number" min="0" max="16" value="4" step="1" />
            </div>

            <div class="control control-inline control-inline-number">
              <label for="lonCount">Vert. lines</label>
              <input id="lonCount" type="number" min="0" max="16" value="4" step="1" />
            </div>
          </div>

          <div class="control checkbox-row">
            <label class="checkbox">
              <input type="checkbox" id="showGlow" checked />
              <span>Sphere glow</span>
            </label>
            <label class="checkbox" style="margin-left: 55px !important;">
              <input type="checkbox" id="showStarGlow" checked />
              <span>Star glow</span>
            </label>
            <label class="checkbox" style="margin-left: 55px !important;">
              <input type="checkbox" id="counterRotateStars" />
              <span>Counter-rotate</span>
            </label>
          </div>

          <div class="control checkbox-row">
            <label class="checkbox">
              <input type="checkbox" id="autoWarp" />
              <span>Auto-warp</span>
            </label>

            <label class="checkbox" style="margin-left: 32px !important;">
              <span>Interval (s)</span>
              <input
                id="autoWarpInterval"
                type="number"
                min="2"
                max="120"
                value="12"
                step="1"
                style="width: 72px; margin-left: 10px;"
              />
            </label>
          </div>

          <hr>

          <div class="control checkbox-row">
            <label class="checkbox">
              <input type="checkbox" id="showFps" />
              <span>Show FPS</span>
            </label>
            <label class="checkbox" style="margin-left: 75px !important;">
              <input type="checkbox" id="showCompass" checked />
              <span>Show compass</span>
            </label>
          </div>

          <div class="buttons">
            <button id="pauseBtn" class="secondary">Pause</button>
            <button id="resetSphereBtn" class="secondary">Reset Sphere</button>
            <button id="resetBtn" class="secondary">Reset View</button>
            <button id="fullscreenBtn" class="secondary">Fullscreen</button>
          </div>
        </aside>

        <div class="fps hidden" id="fpsBox">FPS: <span id="fpsVal">0</span></div>
        <div class="compass" id="compassBox">
          <canvas id="compassCanvas" aria-label="Compass widget"></canvas>
        </div>
      </div>
    </div>

    <script src="js/script.js" defer></script>
  </body>
</html>
